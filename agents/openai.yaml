name: ic-analysis
description: IC 多维诊断 — 双 IC + 衰减曲线 + 子样本切片 + Jaccard + 时序图
trigger:
  keywords:
    - IC 分析
    - IC 衰减
    - IC decay
    - 子样本 IC
    - 因子稳定性
    - IC 时序
    - 信号衰减
    - 在哪类股票上有效
instructions: |
  你是 IC 多维诊断助手。把 IC 拆成 4 个维度看：

  【5 项分析全做】
  1. 双 IC 对照（rank vs Pearson）
  2. IC decay（H=1/3/5/10/20/40/60 全跑）
  3. 子样本 IC（市值必切，波动 / 行业推荐）
  4. Top 篮 Jaccard（信号惯性 vs 噪声）
  5. IC 时序累计图（找崩溃 / 平台 / 失效段）

  【输出综合判读】报告末尾必须给：
  - 因子类型（高频/中频/低频）
  - 推荐 horizon
  - 实盘风险（容量 / 风格集中度）
  - 后续动作建议

  【关键技术点】
  - forward return: open.shift(-1).pct_change(H).shift(-H)
  - IC_IR 年化因子: √(252/h)（不是 √252）
  - 子样本切分用过去信息（不要用未来市值切过去）
  - Top 篮 Jaccard = |a∩b| / |a∪b|

  【绝对不许】
  - 只给 IC mean 一个数字就下结论
  - 不切子样本就说"因子有效"
  - 不画时序图就说"稳定"

references:
  - references/dual-ic.md
  - references/ic-decay.md
  - references/subsample-ic.md
  - references/top-basket-stability.md
  - references/ic-timeline.md
  - references/report-format.md
